
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edge Academy · MyRepublic AI Team</title>
<style>
:root {
  /* Edge Academy brand palette */
  --bg-top: #ffffff;
  --bg-bottom: #eaf0fb;
  --ink: #1e2a3a;
  --ink-soft: #51617a;
  --card: #ffffff;
  --line: #e1e8f3;
  --wire: #9fb0c6;
  --brand: #2f7fe8;
  --brand-ink: #1d5fc4;
  --brand-teal: #16b8c4;
  --focus: #1d5fc4;
  --danger: #d33b54;

  --edge: #2f7fe8;            --edge-ink: #1d5fc4;
  --consulting: #0fb6a6;      --consulting-ink: #0f766e;
  --marketplace: #7b5cff;     --marketplace-ink: #6028d9;
  --bespoke: #ef5da8;         --bespoke-ink: #be185d;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(1200px 500px at 80% -10%, #f1e9ff 0%, rgba(241,233,255,0) 55%),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  min-height: 100vh;
}

:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 10px; }
:focus:not(:focus-visible) { outline: none; }

svg { display: block; }
.icon { width: 1em; height: 1em; flex: 0 0 auto; }

/* ---------- top brand bar ---------- */
.topbar {
  display: flex; align-items: center; gap: 14px; padding: 12px 24px;
  background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30;
}
.logo { display: flex; align-items: center; gap: 11px; text-decoration: none; cursor: pointer; background: none; border: none; padding: 4px 6px; border-radius: 10px; }
.logo svg.mark { width: 40px; height: 40px; }
.logo .word { line-height: .92; text-align: left; }
.logo .word b { display: block; font-weight: 800; letter-spacing: 1px; font-size: 1.02rem; color: var(--ink); }
.logo .word span { display: block; font-weight: 800; letter-spacing: 4px; font-size: .72rem; color: var(--brand-ink); }
.topbar .spacer { flex: 1; }
.topbar .crumb { font-size: .82rem; color: var(--ink-soft); font-weight: 600; }

/* toolbar buttons */
.toolbar { display: flex; align-items: center; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px; min-height: 38px;
  font: inherit; font-size: .82rem; font-weight: 600; cursor: pointer;
  padding: 8px 13px; border-radius: 10px; border: 1px solid var(--brand);
  background: var(--brand); color: #fff; transition: filter .15s ease, background .15s ease;
}
.btn:hover { filter: brightness(1.05); }
.btn.ghost { background: #fff; color: var(--brand-ink); border-color: var(--line); }
.btn.ghost:hover { border-color: var(--brand); background: #f4f8ff; }
.btn.danger { background: #fff; color: var(--danger); border-color: #f0c2cb; }
.btn.danger:hover { background: #fdf2f4; }
.btn .icon { width: 16px; height: 16px; }
.edit-only { display: none; }
body.editing .edit-only { display: inline-flex; }
body.editing #editToggle { background: #fff; color: var(--brand-ink); border-color: var(--brand); }

.wrap { max-width: 1120px; margin: 0 auto; padding: 30px 18px 80px; }

.editmode-banner {
  display: none; max-width: 1120px; margin: 14px auto -6px; padding: 9px 14px;
  background: #fff7e6; border: 1px solid #ffe2a8; color: #8a6212;
  border-radius: 10px; font-size: .82rem; text-align: center;
}
body.editing .editmode-banner { display: block; }

.hero { text-align: center; margin-bottom: 22px; }
.hero h1 { margin: 0 0 8px; font-weight: 800; letter-spacing: -.5px; text-transform: uppercase; font-size: clamp(1.5rem, 4vw, 2.4rem); color: var(--ink); }
.hero p { margin: 0; color: var(--ink-soft); font-size: .92rem; }

.legend { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin: 20px auto 8px; }
.legend span { display: inline-flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--ink-soft); }
.swatch { width: 13px; height: 13px; border-radius: 4px; display: inline-block; }
.legend .wirekey { width: 18px; height: 0; border-top: 2px dashed var(--wire); }

/* ---------- org canvas with connector layer ---------- */
.org { position: relative; margin-top: 28px; }
.wires { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: visible; }
.org > *:not(.wires) { position: relative; z-index: 1; }

.row-head { display: flex; justify-content: center; }
.row-people { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 64px; align-items: flex-start; }
.section-label { text-align: center; color: var(--ink-soft); font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; margin: 58px 0 18px; }
.row-projects { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; align-items: start; }
@media (max-width: 860px) { .row-projects { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 520px) { .row-projects { grid-template-columns: 1fr; } }

/* ---------- cards ---------- */
.card {
  background: var(--card); border: 1px solid var(--line); border-radius: 14px;
  padding: 13px 18px; text-align: center; position: relative;
  box-shadow: 0 6px 18px rgba(31,52,90,.06); transition: transform .18s ease, box-shadow .18s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(31,52,90,.12); }
.card .title { font-weight: 700; font-size: .98rem; }
.card .sub { font-size: .74rem; color: var(--ink-soft); margin-top: 2px; }

.head-node {
  width: 270px; border: 1px solid transparent;
  background: linear-gradient(var(--card), var(--card)) padding-box, linear-gradient(135deg, var(--brand-teal), var(--brand)) border-box;
}
.head-node .title { font-size: 1.1rem; }
.person-node { width: 152px; }
body.editing .person-node { width: 200px; text-align: left; }
body.editing .head-node { width: 300px; text-align: left; }

/* ---------- projects ---------- */
.project { background: var(--card); border: 1px solid var(--line); border-top: 4px solid var(--accent); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 18px rgba(31,52,90,.06); transition: box-shadow .18s ease; }
.project:hover { box-shadow: 0 12px 26px rgba(20,30,50,.14); }
.project-header {
  width: 100%; min-height: 44px; padding: 15px 16px; cursor: pointer; user-select: none; text-align: left;
  background: var(--card); border: none;
  display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: background .18s ease;
}
.project-header:hover { background: rgba(47,127,232,.05); }
.project-header.project-edit { cursor: default; align-items: flex-start; }
.project-header.project-edit:hover { background: var(--card); }
.p-title { font-weight: 800; font-size: 1.18rem; color: var(--accent-ink); }
.owners { font-size: .76rem; color: var(--ink-soft); margin-top: 3px; }
.chevron { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: var(--accent-ink); background: color-mix(in srgb, var(--accent) 14%, white); transition: transform .25s ease; font-size: 14px; }
.project.open .chevron { transform: rotate(90deg); }

.leaves { max-height: 0; overflow: hidden; transition: max-height .25s ease; padding: 0 14px; }
/* when open, allow overflow so items are never clipped / un-clickable */
.project.open .leaves { max-height: 2000px; overflow: visible; padding-bottom: 14px; }
body.editing .leaves { max-height: none; overflow: visible; padding-bottom: 14px; } /* always open while editing */

.leaf {
  position: relative; width: 100%; min-height: 44px; margin-top: 10px; padding: 11px 13px; text-align: left;
  border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 10px; font-size: .9rem; background: #fbfdff;
  display: flex; align-items: center; gap: 10px; color: var(--ink);
  transition: background .18s ease, transform .15s ease, box-shadow .18s ease;
}
.leaf .l-ico { width: 18px; height: 18px; color: var(--accent-ink); }
.leaf .lbl { flex: 1; font-weight: 600; }
.leaf[data-nav]:not([data-nav="none"]) { cursor: pointer; }
/* keep the soft black drop-shadow underneath each toggle on hover */
.leaf:hover { transform: translateY(-1px); box-shadow: 0 7px 16px rgba(20,30,50,.20); }
.leaf[data-nav]:not([data-nav="none"]):hover { background: color-mix(in srgb, var(--accent) 10%, white); }
.leaf .open-ico { width: 15px; height: 15px; color: var(--ink-soft); }

/* ---------- editable fields ---------- */
.edit-field { display: block; margin-top: 8px; }
.edit-field .lab { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); font-weight: 700; }
.edit-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 2px; }
.edit-kicker { font-size: .64rem; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-soft); }
.edit-help { margin: 8px 0 0; font-size: .78rem; color: var(--ink-soft); line-height: 1.45; background: #f4f8ff; border: 1px solid #dce7fb; border-radius: 8px; padding: 9px 11px; }
.leaf-edit { flex-direction: column; align-items: stretch; }
.edit-input, select.edit-input, textarea.edit-input {
  width: 100%; font: inherit; font-size: .85rem; padding: 7px 9px; margin-top: 3px;
  border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
}
textarea.edit-input { resize: vertical; min-height: 46px; line-height: 1.4; }
.del-btn {
  flex: 0 0 auto; width: 26px; height: 26px; border-radius: 7px; cursor: pointer;
  border: 1px solid #f0c2cb; background: #fff; color: var(--danger);
  display: grid; place-items: center; font-size: 16px; line-height: 1;
}
.del-btn:hover { background: #fdf2f4; }
.card .del-btn { position: absolute; top: 8px; right: 8px; }
.add-card, .add-leaf {
  border: 1px dashed #b9c6da; background: #f7faff; color: var(--brand-ink);
  border-radius: 12px; cursor: pointer; font-weight: 700; font-size: .85rem;
  display: grid; place-items: center; min-height: 44px;
}
.add-card { width: 152px; }
.add-leaf { margin-top: 10px; padding: 10px; }
.add-card:hover, .add-leaf:hover { background: #eef4ff; border-color: var(--brand); }
.team-pick { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px 12px; }
.team-pick label { font-size: .78rem; display: inline-flex; align-items: center; gap: 5px; color: var(--ink-soft); }

/* maintenance panel */
.maint {
  max-width: 720px; margin: 40px auto 0; background: #fff; border: 1px solid var(--line);
  border-radius: 16px; padding: 22px 24px; box-shadow: 0 6px 18px rgba(31,52,90,.06);
}
.maint h3 { margin: 0 0 4px; font-size: 1rem; }
.maint p.note { margin: 0 0 16px; font-size: .82rem; color: var(--ink-soft); line-height: 1.5; }
.maint .ctl { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
.switch { display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: .88rem; cursor: pointer; }
.switch input { width: 18px; height: 18px; accent-color: var(--brand); }
.maint select { font: inherit; font-size: .86rem; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: var(--ink); }
.maint .cleanup-report { margin-top: 14px; font-size: .82rem; color: var(--ink-soft); }

/* ---------- content pages ---------- */
.page-card { background: var(--card); border: 1px solid var(--line); border-top: 5px solid var(--accent); border-radius: 18px; padding: 30px; box-shadow: 0 10px 30px rgba(31,52,90,.08); }
.badge { display: inline-flex; align-items: center; gap: 6px; font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-ink); background: color-mix(in srgb, var(--accent) 12%, white); padding: 6px 11px; border-radius: 999px; margin-bottom: 14px; }
.page-card h2 { margin: 0 0 10px; font-size: clamp(1.4rem, 3vw, 2rem); text-transform: uppercase; letter-spacing: -.5px; }
.page-card p.lead { color: var(--ink-soft); margin: 0; max-width: 60ch; line-height: 1.6; }
.grid-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; margin-top: 24px; }
.tile { background: #fbfdff; border: 1px solid var(--line); border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; color: inherit; min-height: 44px; display: flex; flex-direction: column; gap: 8px; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; position: relative; }
.tile:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(31,52,90,.12); border-color: var(--brand); }
.t-icon { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; color: #fff; }
.t-icon .icon { width: 22px; height: 22px; }
.t-title { font-weight: 700; display: flex; align-items: center; gap: 7px; }
.t-title .open-ico { width: 14px; height: 14px; color: var(--ink-soft); }
.t-sub { font-size: .8rem; color: var(--ink-soft); }
.back { display: inline-flex; align-items: center; gap: 7px; min-height: 44px; margin-bottom: 18px; cursor: pointer; padding: 8px 14px 8px 10px; font-size: .85rem; font-weight: 600; color: var(--brand-ink); background: #fff; border: 1px solid var(--line); border-radius: 10px; transition: background .18s ease, border-color .18s ease; }
.back:hover { background: #f4f8ff; border-color: var(--brand); }
.back .icon { width: 16px; height: 16px; }
.soon { margin-top: 22px; padding: 16px 18px; border-radius: 12px; background: #fbfdff; border: 1px dashed var(--line); color: var(--ink-soft); font-size: .9rem; line-height: 1.55; }

/* ---------- setup / command interface ---------- */
.setup { margin-top: 26px; }
.setup-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.setup-kicker { display: inline-flex; align-items: center; gap: 6px; font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-ink); }
.setup-kicker .icon { width: 15px; height: 15px; }
.setup-title { margin: 0; font-size: 1.05rem; }
.setup-note { margin: 8px 0 14px; color: var(--ink-soft); font-size: .9rem; line-height: 1.5; }
.codeblock { border: 1px solid #28344a; border-radius: 14px; overflow: hidden; box-shadow: 0 10px 26px rgba(20,30,50,.16); }
.cb-bar { display: flex; align-items: center; gap: 7px; padding: 10px 14px; background: #16202e; }
.cb-dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; }
.cb-name { font-size: .74rem; color: #8aa0bd; margin-left: 6px; letter-spacing: .04em; }
.copy-btn { margin-left: auto; font: inherit; font-size: .74rem; font-weight: 600; cursor: pointer; color: #cfe0f5; background: #243247; border: 1px solid #33455f; padding: 6px 12px; border-radius: 8px; min-height: 30px; transition: background .15s ease; }
.copy-btn:hover { background: #2d3e57; }
.codeblock pre { margin: 0; padding: 16px 18px; background: #1e2a3a; color: #e8f0fb; font-family: "Cascadia Code", "Consolas", ui-monospace, monospace; font-size: .84rem; line-height: 1.7; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
.setup-warn { margin: 12px 0 0; font-size: .78rem; color: #8a6212; background: #fff7e6; border: 1px solid #ffe2a8; border-radius: 8px; padding: 9px 11px; line-height: 1.45; }

/* ---------- AI Foundations dashboard ---------- */
.dash-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
.dash-h1 { margin: 10px 0 2px; font-size: clamp(1.4rem, 3vw, 1.9rem); text-transform: uppercase; letter-spacing: -.5px; }
.dash-sub { margin: 0; color: var(--ink-soft); font-size: .9rem; }
.dash { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: start; }
@media (min-width: 900px) { .dash { grid-template-columns: minmax(0,2.5fr) minmax(0,1fr); } }
.dash-main, .dash-side { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
.dash-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 560px) { .dash-metrics { grid-template-columns: 1fr; } }
.metric { display: flex; align-items: center; gap: 14px; background: #f8fafc; border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; }
.metric .m-ico { width: 46px; height: 46px; border-radius: 11px; background: #fff; border: 1px solid var(--line); display: grid; place-items: center; color: var(--edge-ink); flex: 0 0 auto; }
.metric .m-ico .icon { width: 22px; height: 22px; }
.metric .m-lbl { font-size: .72rem; color: var(--ink-soft); font-weight: 600; }
.metric .m-val { font-size: 1.5rem; font-weight: 800; line-height: 1.15; }
.panel { background: #fff; border: 1px solid var(--line); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 18px rgba(31,52,90,.06); }
.panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fff; }
.panel-head h3 { margin: 0; font-size: 1.05rem; }
.panel-title-sm { font-size: .7rem; text-transform: uppercase; letter-spacing: .14em; font-weight: 800; color: var(--ink-soft); }
.small-link { background: none; border: none; color: var(--edge-ink); font: inherit; font-weight: 700; font-size: .78rem; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.small-link:hover { text-decoration: underline; }
.panel-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
.roadmap { width: 100%; border-collapse: collapse; }
.roadmap th { text-align: left; font-size: .64rem; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); font-weight: 700; padding: 11px 18px; background: #f8fafc; border-bottom: 1px solid var(--line); }
.roadmap td { padding: 12px 18px; border-bottom: 1px solid var(--line); font-size: .88rem; vertical-align: middle; }
.roadmap tbody tr:last-child td { border-bottom: none; }
.roadmap tbody tr:hover td { background: #f8fafc; }
.mod-name { display: flex; align-items: center; gap: 12px; }
.mod-num { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-weight: 800; font-size: .85rem; flex: 0 0 auto; background: #dbeafe; color: var(--edge-ink); }
.mod-title { display: block; font-weight: 600; }
.mod-desc { display: block; font-size: .76rem; color: var(--ink-soft); margin-top: 2px; line-height: 1.4; }
.status-select { appearance: none; -webkit-appearance: none; font: inherit; font-size: .66rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; border: 1px solid transparent; border-radius: 999px; padding: 6px 26px 6px 12px; cursor: pointer; background-repeat: no-repeat; background-position: right 9px center; background-size: 9px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%23555' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>"); }
.status-select.published { background-color: #dcfce7; color: #166534; }
.status-select.review { background-color: #fef9c3; color: #854d0e; }
.status-select.draft { background-color: #eef1f5; color: #5b6677; }
.status-select:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
/* the expanded option list stays neutral grey regardless of status */
.status-select option { background-color: #eef1f5; color: var(--ink); font-weight: 600; }
.mod-time { color: var(--ink-soft); font-size: .82rem; white-space: nowrap; }
.badge-status { display: inline-block; padding: 4px 11px; border-radius: 999px; font-size: .64rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
.badge-status.published { background: #dcfce7; color: #166534; }
.badge-status.review { background: #fef9c3; color: #854d0e; }
.badge-status.draft { background: #eef1f5; color: #5b6677; }
.dash-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 620px) { .dash-bento { grid-template-columns: 1fr; } }
.bento-ai { background: linear-gradient(135deg, var(--edge), var(--edge-ink)); color: #fff; border-radius: 16px; padding: 18px; }
.bento-ai h4 { margin: 0 0 8px; font-size: 1.02rem; display: flex; align-items: center; gap: 8px; }
.bento-ai h4 .icon { width: 20px; height: 20px; }
.bento-ai p { margin: 0 0 14px; font-size: .82rem; opacity: .93; line-height: 1.5; }
.pill-btn { background: #fff; color: var(--edge-ink); border: none; font: inherit; font-weight: 700; font-size: .78rem; padding: 8px 13px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.pill-btn .icon { width: 15px; height: 15px; }
.pill-btn:hover { background: #eef4ff; }
.bento-next { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; gap: 16px; }
.bento-next .kicker { color: var(--edge-ink); font-weight: 800; font-size: .66rem; text-transform: uppercase; letter-spacing: .1em; }
.bento-next h4 { margin: 4px 0 0; font-size: 1.12rem; }
.next-ico { width: 46px; height: 46px; border-radius: 50%; background: #dbeafe; color: var(--edge-ink); display: grid; place-items: center; flex: 0 0 auto; }
.prog-row { display: flex; justify-content: space-between; font-size: .74rem; color: var(--ink-soft); margin-bottom: 6px; font-weight: 600; }
.progress { height: 8px; background: #eef1f5; border-radius: 999px; overflow: hidden; }
.progress > i { display: block; height: 100%; background: var(--edge); border-radius: 999px; }
.activity-item { display: flex; gap: 11px; }
.activity-item .dot2 { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex: 0 0 auto; }
.activity-item .ai-txt { margin: 0; font-size: .83rem; line-height: 1.4; }
.activity-item .ai-time { margin: 2px 0 0; font-size: .72rem; color: var(--ink-soft); }

function touch(rec) { if (rec) rec.lastEdited = now(); }

/* stamp lastEdited on every editable record that lacks one */
function seedTimestamps(d, ts) {
  ts = ts || now();
  const stamp = (r) => { if (r && r.lastEdited == null) r.lastEdited = ts; };
  stamp(d.head);
  (d.people || []).forEach(stamp);
  (d.projects || []).forEach(p => { stamp(p); (p.leaves || []).forEach(stamp); });
  Object.values(d.pages || {}).forEach(stamp);
  (d.courses || []).forEach(stamp);
}

function load() {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { /* storage blocked */ }
  if (raw) {
    try { DATA = JSON.parse(raw); } catch (e) { DATA = clone(DEFAULT_DATA); }
  } else {
    DATA = clone(DEFAULT_DATA);
  }
  if (!DATA.settings) DATA.settings = clone(DEFAULT_DATA.settings);
  // fill in any missing link keys (e.g. new skool / edgeAcademy) without losing saved edits
  DATA.links = Object.assign({}, clone(DEFAULT_DATA.links), DATA.links || {});
  DATA.dashboard = Object.assign({}, clone(DEFAULT_DATA.dashboard), DATA.dashboard || {});
  normalizeDashboard();
  if (!DATA.pages) DATA.pages = {};
  // bring across any default course fields (e.g. the dashboard view) a previously-saved copy lacks
  (DEFAULT_DATA.courses || []).forEach(dc => {
    const sc = (DATA.courses || []).find(c => c.slug === dc.slug);
    if (!sc) return;
    Object.keys(dc).forEach(k => { if (sc[k] == null) sc[k] = dc[k]; });
    if (sc.view === "dashboard" && sc.code) delete sc.code;
    if (sc.view === "dashboard" && dc.dashboard) {
      sc.dashboard = Object.assign({}, clone(dc.dashboard), sc.dashboard || {});
      if (sc.dashboard.modules) sc.dashboard.modules.forEach(m => {
        if (!Array.isArray(m.owners)) m.owners = m.owner ? [m.owner] : [];
        delete m.owner;
        if (!Array.isArray(m.files)) m.files = [];
      });
    } // scrub the old API-key snippet
  });
  seedTimestamps(DATA);
  // run auto-cleanup on load if enabled
  runCleanup(false);
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
    catch (e) { toast("Could not save to this browser (storage blocked). Use Export instead."); }
  }, 200);
}

function toast(msg, ms) {
  toastEl.textContent = msg;

  toast._t = setTimeout(() => toastEl.classList.remove("show"), ms || 3200);
}

/* =========================================================================
   AUTO-CLEANUP — delete items not edited within the retention window
   ========================================================================= */
function cutoffTime(months) {
  const d = new Date();
  d.setMonth(d.getMonth() - months);
  return d.getTime();
}

function runCleanup(manual) {
  const s = DATA.settings;
  if (!s.autoCleanup) {
    if (manual) toast("Auto-cleanup is disabled — enable it first.");
    return;
  }
  const cutoff = cutoffTime(s.retentionMonths);
  const stale = (r) => r && r.lastEdited != null && r.lastEdited < cutoff;
  const removed = [];

  // people
  const keptPeople = [];
  (DATA.people || []).forEach(p => { if (stale(p)) removed.push("Person: " + p.name); else keptPeople.push(p); });
  DATA.people = keptPeople;
  const peopleIds = new Set(DATA.people.map(p => p.id));

  // projects (and their leaves); drop dangling owner refs
  const keptProjects = [];
  (DATA.projects || []).forEach(pr => {
    if (stale(pr)) { removed.push("Project: " + pr.name); return; }
    pr.team = (pr.team || []).filter(id => peopleIds.has(id));
    const keptLeaves = [];
    (pr.leaves || []).forEach(lf => { if (stale(lf)) removed.push("Item: " + pr.name + " › " + lf.lbl); else keptLeaves.push(lf); });
    pr.leaves = keptLeaves;
    keptProjects.push(pr);
  });
  DATA.projects = keptProjects;

  // courses
  const keptCourses = [];
  (DATA.courses || []).forEach(c => { if (stale(c)) removed.push("Course: " + c.title); else keptCourses.push(c); });
  DATA.courses = keptCourses;

  // detail pages
  Object.keys(DATA.pages || {}).forEach(k => { if (stale(DATA.pages[k])) { removed.push("Page: " + DATA.pages[k].title); delete DATA.pages[k]; } });

  if (removed.length) {
    save();
    const summary = removed.length + " item(s) removed (not edited in " + s.retentionMonths + " month" + (s.retentionMonths > 1 ? "s" : "") + ")";
    DATA._lastCleanup = { when: now(), summary, removed };
    if (manual) toast(summary);
  } else if (manual) {
    DATA._lastCleanup = { when: now(), summary: "Nothing to remove — all items edited within the window.", removed: [] };
    toast("Nothing to remove — everything is within the window.");
  }
}

/* ----- AI Foundations dashboard: state + actions ----- */
function relativeTime(ts) {
  const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (s < 60) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return m + " minute" + (m > 1 ? "s" : "") + " ago";
  const h = Math.floor(m / 60); if (h < 24) return h + " hour" + (h > 1 ? "s" : "") + " ago";
  const dd = Math.floor(h / 24); if (dd < 7) return dd + " day" + (dd > 1 ? "s" : "") + " ago";
  const w = Math.floor(dd / 7); return w + " week" + (w > 1 ? "s" : "") + " ago";
}
function humanSize(b) {
  if (b == null) return "";
  const u = ["B", "KB", "MB", "GB"]; let n = b, i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return (i === 0 || n >= 10 ? Math.round(n) : n.toFixed(1)) + " " + u[i];
}
function iconForFile(name) {
  const ext = (String(name).split(".").pop() || "").toLowerCase();
  if (["mp4", "mov", "avi", "mkv", "webm", "m4v"].includes(ext)) return "video";
  if (["zip", "rar", "7z", "tar", "gz"].includes(ext)) return "folder";
  return "file";
}
function logActivity(html, key) {
  const acts = curDash().activity;
  const t = now();
  if (key) { // a burst of the same action on the same module collapses to its final result
    const i = acts.findIndex(a => a.key === key && a.ts != null && (t - a.ts) < ACTIVITY_COALESCE_MS);
    if (i > -1) acts.splice(i, 1);
  }
  acts.unshift({ html: html, ts: t, key: key });
  if (acts.length > 40) acts.length = 40;
}
function refreshDashboard() {            // re-render in place, keeping scroll position
  const y = window.scrollY;
  route();
  window.scrollTo(0, y);
}
let activeCourse = "ai-foundations";
function curDash() {            // the dashboard for the course currently being viewed/edited
  const c = findCourse(activeCourse);
  return (c && c.dashboard) || DATA.dashboard;
}
function normalizeDashboard() {
  (DATA.dashboard.modules || []).forEach(m => {
    if (!Array.isArray(m.owners)) m.owners = m.owner ? [m.owner] : [];
    delete m.owner;
    if (!Array.isArray(m.files)) m.files = [];
  });
}
function ownerName(id) { const p = findPerson(id); return p ? p.name : "Unassigned"; }
function ownerInitials(id) {
  const p = findPerson(id);
  if (!p) return "—";
  return p.name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
}
function timelineOptionsHTML(sel) {
  let opts = TIMELINE_OPTIONS.slice();
  if (sel && opts.indexOf(sel) === -1) opts = [sel].concat(opts);
  return opts.map(o => `<option value="${esc(o)}" ${o === sel ? "selected" : ""}>${esc(o)}</option>`).join("");
}
function timelineRank(t) {
  const s = String(t || "").toLowerCase();
  const q = (s.match(/q([1-4])/) || [])[1];
  const quarter = q ? parseInt(q, 10) : 9;            // unknown / TBD sorts last
  const phase = s.indexOf("launch") > -1 ? 0 : s.indexOf("review") > -1 ? 1 : s.indexOf("planned") > -1 ? 2 : 3;
  return quarter * 10 + phase;                        // earliest quarter, then closest to launching
}
function nextMilestoneModule() {
  const up = (curDash().modules || []).filter(m => m.status !== "published");
  if (!up.length) return null;
  return up.slice().sort((a, b) => timelineRank(a.timeline) - timelineRank(b.timeline))[0];
}
function moduleProgress(status) { return status === "published" ? 100 : status === "review" ? 60 : 20; }
function setModuleField(id, key, val, isSelect) {
  const m = curDash().modules.find(x => x.id === id);
  if (!m || m[key] === val) return;
  m[key] = val;
  if (isSelect) {
    if (key === "status") logActivity('“<strong>' + esc(m.name) + '</strong>” set to ' + (DASH_STATUS[val] || val) + ".", "status:" + id);
    else if (key === "timeline") logActivity('“<strong>' + esc(m.name) + '</strong>” scheduled for ' + esc(val) + ".", "timeline:" + id);
    else if (key === "owner") logActivity('“<strong>' + esc(m.name) + '</strong>” assigned to ' + esc(ownerName(val)) + ".", "owner:" + id);
    save(); refreshDashboard();
  } else {
    save();
  }
}
function submitNewModule() {
  const nameEl = document.getElementById("nm-name");
  const name = ((nameEl && nameEl.value) || "").trim();
  if (!name) { toast("Please enter a module name."); if (nameEl) nameEl.focus(); return; }
  const desc = (document.getElementById("nm-desc").value || "").trim();
  const timeline = document.getElementById("nm-timeline").value || "Q1 Planned";
  const status = document.getElementById("nm-status").value || "draft";
  const owners = Array.from(document.querySelectorAll(".nm-owner-cb:checked")).map(c => c.value);
  const files = [];
  const fi = document.getElementById("nm-files");
  if (fi && fi.files) Array.from(fi.files).forEach(f => {
    const ext = (f.name.split(".").pop() || "").toUpperCase();
    files.push({ id: genId("mf"), name: f.name, meta: humanSize(f.size) + (ext ? " · " + ext : ""), icon: iconForFile(f.name) });
  });
  curDash().modules.push({ id: genId("mod"), name: name, desc: desc, timeline: timeline, status: status, owners: owners, files: files });
  logActivity('New module “<strong>' + esc(name) + '</strong>” created' + (files.length ? " with " + files.length + " document" + (files.length > 1 ? "s" : "") : "") + ".");
  save();
  location.hash = "#/course/" + activeCourse;
  toast("Module created.");
}
function delModule(id) {
  const m = curDash().modules.find(x => x.id === id);
  if (!m) return;
  if (!confirm("Delete module “" + m.name + "”?")) return;
  curDash().modules = curDash().modules.filter(x => x.id !== id);

}
function applyRecommendation() {

  r.applied = true;
  logActivity("Applied the AI recommendation (Governance Ethics focus +15%).");
  save(); refreshDashboard(); toast("Recommendation applied.");
}
function delResource(id) {
  const r = curDash().resources.find(x => x.id === id);
  if (!r) return;
  curDash().resources = curDash().resources.filter(x => x.id !== id);
  logActivity('Removed “<strong>' + esc(r.name) + '</strong>” from the library.');

}
function addDashFiles(files) {
  const arr = Array.from(files || []);
  if (!arr.length) return;
  arr.forEach(f => {
    const ext = (f.name.split(".").pop() || "").toUpperCase();
    curDash().resources.unshift({ id: genId("res"), name: f.name, meta: humanSize(f.size) + (ext ? " · " + ext : ""), icon: iconForFile(f.name) });
  });
  logActivity(arr.length + " file" + (arr.length > 1 ? "s" : "") + " added to the Resource Library.");
  save(); refreshDashboard(); toast(arr.length + " file" + (arr.length > 1 ? "s" : "") + " added.");
}
function toggleModuleOwner(mid, pid, on) {
  const m = curDash().modules.find(x => x.id === mid);
  if (!m) return;
  if (!Array.isArray(m.owners)) m.owners = [];
  if (on) { if (m.owners.indexOf(pid) === -1) m.owners.push(pid); }
  else m.owners = m.owners.filter(x => x !== pid);
  logActivity('“<strong>' + esc(m.name) + '</strong>” leads: ' + (m.owners.length ? esc(m.owners.map(ownerName).join(", ")) : "Unassigned") + ".", "owners:" + mid);
  save(); refreshDashboard();
}
function addModuleFiles(mid, files) {
  const m = curDash().modules.find(x => x.id === mid);
  if (!m) return;
  if (!Array.isArray(m.files)) m.files = [];
  const arr = Array.from(files || []);
  if (!arr.length) return;
  arr.forEach(f => {
    const ext = (f.name.split(".").pop() || "").toUpperCase();
    m.files.unshift({ id: genId("mf"), name: f.name, meta: humanSize(f.size) + (ext ? " · " + ext : ""), icon: iconForFile(f.name) });
  });
  logActivity(arr.length + " document" + (arr.length > 1 ? "s" : "") + " added to “<strong>" + esc(m.name) + "</strong>”.");
  save(); refreshDashboard(); toast(arr.length + " document" + (arr.length > 1 ? "s" : "") + " added.");
}
function delModuleFile(mid, fid) {
  const m = curDash().modules.find(x => x.id === mid);
  if (!m || !Array.isArray(m.files)) return;
  const f = m.files.find(x => x.id === fid);
  m.files = m.files.filter(x => x.id !== fid);
  if (f) logActivity('Removed “<strong>' + esc(f.name) + '</strong>” from “<strong>' + esc(m.name) + '</strong>”.');

}
function attachModuleUploader() {
  const dz = document.getElementById("modDrop");
  const fi = document.getElementById("modFile");
  if (!dz) return;
  const mid = dz.getAttribute("data-id");
  if (fi) fi.addEventListener("change", (e) => { addModuleFiles(mid, e.target.files); e.target.value = ""; });
  dz.addEventListener("click", () => { if (fi) fi.click(); });
  dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
  dz.addEventListener("drop", (e) => { e.preventDefault(); dz.classList.remove("drag"); addModuleFiles(mid, e.dataTransfer && e.dataTransfer.files); });
}
function attachDashboardHandlers() {     // drag/drop + click-to-browse (events that don't delegate cleanly)
  const dz = document.getElementById("dashDrop");
  const fi = document.getElementById("dashFile");
  if (fi) fi.addEventListener("change", (e) => { addDashFiles(e.target.files); e.target.value = ""; });
  if (dz) {
    dz.addEventListener("click", () => { if (fi) fi.click(); });
    dz.addEventListener("dragover", (e) => { e.preventDefault(); dz.classList.add("drag"); });
    dz.addEventListener("dragleave", () => dz.classList.remove("drag"));
    dz.addEventListener("drop", (e) => { e.preventDefault(); dz.classList.remove("drag"); addDashFiles(e.dataTransfer && e.dataTransfer.files); });
  }
}

/* =========================================================================
   CONNECTOR DRAWING
   ========================================================================= */
function drawWires() {
  const org = document.getElementById("org");
  const svg = document.getElementById("wires");
  if (!org || !svg || editing) return;
  const o = org.getBoundingClientRect();
  svg.setAttribute("width", Math.round(o.width));
  svg.setAttribute("height", Math.round(org.scrollHeight));

  const box = (id) => {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return { cx: r.left - o.left + r.width / 2, top: r.top - o.top, bottom: r.bottom - o.top };
  };
  const curve = (a, b, color, w, op) => {
    if (!a || !b) return "";
    const sx = a.cx, sy = a.bottom, tx = b.cx, ty = b.top;
    const dy = Math.max(28, (ty - sy) * 0.5);
    return `<path d="M ${sx} ${sy} C ${sx} ${sy + dy} ${tx} ${ty - dy} ${tx} ${ty}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linecap="round" opacity="${op}"/>`
         + `<circle cx="${sx}" cy="${sy}" r="3" fill="${color}"/><circle cx="${tx}" cy="${ty}" r="3" fill="${color}"/>`;
  };

  let paths = "";
  const head = box("n-head");
  DATA.people.forEach(p => { paths += curve(head, box("n-" + p.id), cssVar("--wire"), 2, 0.75); });
  DATA.projects.forEach(pr => {
    const color = cssVar("--" + pr.accent) || cssVar("--edge");
    (pr.team || []).forEach(pid => { paths += curve(box("n-" + pid), box("h-" + pr.id), color, 2.5, 0.85); });
  });
  svg.innerHTML = paths;
}

/* =========================================================================
   ROUTER  (internal routes stay in THIS tab — no localhost re-fetch)
   ========================================================================= */
function route() {
  if (orgObserver) { orgObserver.disconnect(); orgObserver = null; }
  const h = location.hash.replace(/^#\/?/, "");
  if (!h)                           renderHome();
  else if (h === "courses")         renderCourses();
  else if (h === "community")       renderCommunity();
  else if (h === "social")          renderSocial();
  else if (h.startsWith("course/")) {
    const parts = h.slice(7).split("/");
    const slug = parts[0];
    if (findCourse(slug)) activeCourse = slug;
    if (parts[1] === "new-module")    renderNewModule(slug);
    else if (parts[1] === "module")   renderModuleDetail(slug, parts[2]);
    else                              renderCourse(slug);
  }
  else if (h.startsWith("page/"))   renderDetail(h.slice(5));
  else                              renderHome();
  window.scrollTo(0, 0);
}
const reRender = () => route();

/* =========================================================================
   NAVIGATION (view mode)
   ========================================================================= */
function navigate(leaf) {
  switch (leaf.nav) {
    case "view": location.hash = "#/" + (leaf.target || "");           break; // same tab
    case "page": location.hash = "#/page/" + (leaf.target || "");      break; // same tab
    case "ext":
      if (leaf.target && leaf.target !== "#") window.open(leaf.target, "_blank", "noopener");
      else toast("No URL set for this link yet.");
      break;
    default: /* none */ break;
  }
}

/* =========================================================================
   EDIT-MODE WIRING
   ========================================================================= */
function setField(path, value) {
  const p = path.split(".");
  switch (p[0]) {
    case "head":    DATA.head[p[1]] = value; touch(DATA.head); break;
    case "person":  { const r = findPerson(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "project": { const r = findProject(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "leaf":    { const r = findLeaf(p[1], p[2]); if (r) { r[p[3]] = value; touch(r); } break; }
    case "course":  { const r = findCourse(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "page":    { const r = DATA.pages[p[1]]; if (r) { r[p[2]] = value; touch(r); } break; }
    case "link":    DATA.links[p[1]] = value; break;
  }
  save();
}

function addRecord(spec) {
  const p = spec.split(".");
  if (p[0] === "person") {
    DATA.people.push({ id: genId("p"), name: "New person", tip: "", lastEdited: now() });
  } else if (p[0] === "project") {
    DATA.projects.push({ id: genId("proj"), name: "New project", accent: ACCENTS[DATA.projects.length % ACCENTS.length], team: [], tip: "", leaves: [], lastEdited: now() });
  } else if (p[0] === "leaf") {
    const pr = findProject(p[1]);
    if (pr) pr.leaves.push({ id: genId("l"), lbl: "New item", nav: "none", target: "", tip: "", lastEdited: now() });
  } else if (p[0] === "course") {
    // A new course gets the same dashboard layout as the finished courses,
    // just blank — ready for you to add its modules via "Create New Module".
    DATA.courses.push({
      slug: genId("course"), title: "New course", sub: "", view: "dashboard",
      dashboard: {
        studentsEnrolled: "",
        milestoneTitle: "",
        recommendation: { text: "", applied: false },
        modules: [],
        activity: [],
        resources: [],
      },
      lastEdited: now(),
    });
  }
  save(); reRender();
}

function delRecord(spec) {
  const p = spec.split(".");
  if (p[0] === "person")  DATA.people = DATA.people.filter(x => x.id !== p[1]);
  else if (p[0] === "project") DATA.projects = DATA.projects.filter(x => x.id !== p[1]);
  else if (p[0] === "leaf") { const pr = findProject(p[1]); if (pr) pr.leaves = pr.leaves.filter(x => x.id !== p[2]); }
  else if (p[0] === "course") DATA.courses = DATA.courses.filter(x => x.slug !== p[1]);
  save(); reRender();
}

function onChangeSelectOrCheck(el) {
  // accent / nav selects
  const ch = el.getAttribute("data-change");
  if (ch) {
    const p = ch.split(".");
    if (p[0] === "project") { const r = findProject(p[1]); if (r) { r[p[2]] = el.value; touch(r); } }
    else if (p[0] === "leaf") {
      const r = findLeaf(p[1], p[2]);
      if (r) {
        r[p[3]] = el.value; touch(r);
        if (p[3] === "nav") {
          // when the action changes, give the target a sensible default for that action
          if (r.nav === "view" && !["courses", "community", "social"].includes(r.target)) r.target = "courses";
          else if (r.nav === "ext" && !/^https?:/i.test(r.target || "")) r.target = "";
          else if (r.nav === "none") r.target = "";
          else if (r.nav === "page") { if (!r.target || ["courses","community","social"].includes(r.target)) r.target = slugify(r.lbl); }
        }
        // ensure an info page exists to back a "page" item
        if (r.nav === "page" && r.target && !DATA.pages[r.target]) {
          DATA.pages[r.target] = { title: r.lbl, project: "", accent: "edge", desc: "", lastEdited: now() };
        }
      }
    }
    save(); reRender(); return;
  }
  // owner checkboxes
  const team = el.getAttribute("data-team");
  if (team) {
    const pr = findProject(team);
    if (pr) {
      const id = el.value;
      if (el.checked) { if (!pr.team.includes(id)) pr.team.push(id); }
      else pr.team = pr.team.filter(x => x !== id);
      touch(pr); save(); reRender();
    }
  }
}

/* ---- editor toolbar actions ---- */
function setEditing(on) {
  editing = on;
  document.body.classList.toggle("editing", on);
  document.getElementById("editToggle").innerHTML = on ? "Done" : (I.pencil + "Edit");
  reRender();
}

function exportJSON() {
  const out = clone(DATA); delete out._lastCleanup;
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "flowchart-data.json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Exported flowchart-data.json — share this file to share your edits.");
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed.people || !parsed.projects) throw new Error("Not a flowchart data file");
      DATA = parsed;
      if (!DATA.settings) DATA.settings = clone(DEFAULT_DATA.settings);
      DATA.links = Object.assign({}, clone(DEFAULT_DATA.links), DATA.links || {});
      DATA.dashboard = Object.assign({}, clone(DEFAULT_DATA.dashboard), DATA.dashboard || {});
      normalizeDashboard();
      if (!DATA.pages) DATA.pages = {};
      (DEFAULT_DATA.courses || []).forEach(dc => {
        const sc = (DATA.courses || []).find(c => c.slug === dc.slug);
        if (sc && sc.view === "dashboard" && dc.dashboard) {
          sc.dashboard = Object.assign({}, clone(dc.dashboard), sc.dashboard || {});
          if (sc.dashboard.modules) sc.dashboard.modules.forEach(m => {
            if (!Array.isArray(m.owners)) m.owners = m.owner ? [m.owner] : [];
            delete m.owner;
            if (!Array.isArray(m.files)) m.files = [];
          });
        }
      });
      seedTimestamps(DATA);
      save(); location.hash = ""; reRender();
      toast("Imported successfully.");
    } catch (e) { toast("Import failed: " + e.message); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm("Reset all content back to the original defaults? Your edits in this browser will be lost.")) return;
  DATA = clone(DEFAULT_DATA); seedTimestamps(DATA); save(); location.hash = ""; reRender();
  toast("Reset to defaults.");
}

/* =========================================================================
   GLOBAL EVENT WIRING
   ========================================================================= */
document.getElementById("editToggle").addEventListener("click", () => setEditing(!editing));
document.getElementById("exportBtn").addEventListener("click", exportJSON);
document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("importInput").addEventListener("change", (e) => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });
document.getElementById("homeLogo").addEventListener("click", () => { location.hash = ""; });

/* text inputs / textareas — update model only (no re-render → keeps focus) */
app.addEventListener("input", (e) => {
  const bind = e.target.getAttribute && e.target.getAttribute("data-bind");
  if (bind) { setField(bind, e.target.value); return; }
  const mb = e.target.getAttribute && e.target.getAttribute("data-mod-bind");
  if (mb) setModuleField(e.target.getAttribute("data-id"), mb, e.target.value, false);
});

/* selects + checkboxes */
app.addEventListener("change", (e) => {
  if (e.target.matches("[data-mod-change]")) { setModuleField(e.target.getAttribute("data-id"), e.target.getAttribute("data-mod-change"), e.target.value, true); return; }
  if (e.target.matches("[data-mod-owner]")) { toggleModuleOwner(e.target.getAttribute("data-id"), e.target.getAttribute("data-mod-owner"), e.target.checked); return; }
  if (e.target.matches("[data-change], [data-team]")) onChangeSelectOrCheck(e.target);
  if (e.target.id === "cleanupToggle") {
    if (e.target.checked && !confirm("Enable auto-cleanup? Items not edited within the selected window will be permanently deleted (on load and when you run it). Export a backup first.")) {
      e.target.checked = false; return;
    }
    DATA.settings.autoCleanup = e.target.checked; save();
    if (e.target.checked) runCleanup(true);
    reRender();
  }
  if (e.target.id === "retentionSelect") { DATA.settings.retentionMonths = parseInt(e.target.value, 10); save(); }
});

/* clicks: navigation, expand, add/delete, back, cleanup-now */
app.addEventListener("click", (e) => {
  const t = e.target;
  const backEl = t.closest("[data-back]");
  if (backEl) { location.hash = backEl.getAttribute("data-back") || ""; return; }
  if (t.id === "cleanupNow") { runCleanup(true); reRender(); return; }

  if (t.closest("[data-noop]")) { toast("This control isn't wired up yet."); return; }

  // ----- AI Foundations dashboard controls -----
  if (t.closest("[data-dash-add-module]")) { location.hash = "#/course/" + activeCourse + "/new-module"; return; }
  if (t.closest("[data-create-module]")) { submitNewModule(); return; }
  const moEl = t.closest("[data-mod-open]"); if (moEl) { location.hash = "#/course/" + activeCourse + "/module/" + moEl.getAttribute("data-id"); return; }
  const dmEl = t.closest("[data-dash-del-module]"); if (dmEl) { delModule(dmEl.getAttribute("data-id")); return; }
  if (t.closest("[data-dash-apply]")) { applyRecommendation(); return; }
  if (t.closest("[data-dash-activity-toggle]")) { dashActivityExpanded = !dashActivityExpanded; refreshDashboard(); return; }
  const drEl = t.closest("[data-dash-del-res]"); if (drEl) { delResource(drEl.getAttribute("data-id")); return; }
  const mfEl = t.closest("[data-mod-del-file]"); if (mfEl) { delModuleFile(mfEl.getAttribute("data-mid"), mfEl.getAttribute("data-fid")); return; }

  const copyEl = t.closest("[data-copy]");
  if (copyEl) {
    const txt = copyEl.getAttribute("data-copy");
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(() => toast("Copied to clipboard.")).catch(() => toast("Copy failed — select the text manually."));
    } else { toast("Copy not supported here — select the text manually."); }
    return;
  }

  const del = t.closest("[data-del]"); if (del) { delRecord(del.getAttribute("data-del")); return; }
  const add = t.closest("[data-add]"); if (add) { addRecord(add.getAttribute("data-add")); return; }

  if (editing) return; // no navigation while editing

  const course = t.closest("[data-course]");
  if (course) { location.hash = "#/course/" + course.getAttribute("data-course"); return; }

  const leafEl = t.closest(".leaf[data-leaf]");
  if (leafEl && leafEl.getAttribute("data-nav") !== "none") {
    const parts = leafEl.getAttribute("data-leaf").split(".");
    const lf = findLeaf(parts[0], parts[1]); if (lf) navigate(lf);
    return;
  }
  const header = t.closest(".project-header");
  if (header) {
    const open = header.closest(".project").classList.toggle("open");
    header.setAttribute("aria-expanded", open ? "true" : "false");
    drawWires(); setTimeout(drawWires, 320);
  }
});

/* keyboard activation for nodes (a11y) */
app.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
  if (editing) return;
  const el = e.target;
  if (el.matches(".leaf[data-leaf], .project-header, [data-course]")) {
    e.preventDefault(); el.click();
  }
});

let resizeT = null;
window.addEventListener("resize", () => { clearTimeout(resizeT); resizeT = setTimeout(drawWires, 80); });
window.addEventListener("hashchange", route);

/* ---- boot ---- */
load();
document.getElementById("editToggle").innerHTML = I.pencil + "Edit";
route();
</script>
