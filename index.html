<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edge Academy &middot; MyRepublic AI Team</title>
<style>
:root {
  /* Edge Academy brand palette */
  --bg-top: #ffffff;
  --bg-bottom: #eaf0fb;
  --ink: #1e2a3a;
  --ink-soft: #51617a;
  --card: #ffffff;
  --line: #e1e8f3;
  --wire: #9fb0c6;
  --brand: #2f7fe8;
  --brand-ink: #1d5fc4;
  --brand-teal: #16b8c4;
  --focus: #1d5fc4;
  --danger: #d33b54;

  --edge: #2f7fe8;            --edge-ink: #1d5fc4;
  --consulting: #0fb6a6;      --consulting-ink: #0f766e;
  --marketplace: #7b5cff;     --marketplace-ink: #6028d9;
  --bespoke: #ef5da8;         --bespoke-ink: #be185d;
}

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(1200px 500px at 80% -10%, #f1e9ff 0%, rgba(241,233,255,0) 55%),
    linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
  min-height: 100vh;
}

:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 10px; }
:focus:not(:focus-visible) { outline: none; }

svg { display: block; }
.icon { width: 1em; height: 1em; flex: 0 0 auto; }

/* ---------- top brand bar ---------- */
.topbar {
  display: flex; align-items: center; gap: 14px; padding: 12px 24px;
  background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 30;
}
.logo { display: flex; align-items: center; gap: 11px; text-decoration: none; cursor: pointer; background: none; border: none; padding: 4px 6px; border-radius: 10px; }
.logo svg.mark { width: 40px; height: 40px; }
.logo .word { line-height: .92; text-align: left; }
.logo .word b { display: block; font-weight: 800; letter-spacing: 1px; font-size: 1.02rem; color: var(--ink); }
.logo .word span { display: block; font-weight: 800; letter-spacing: 4px; font-size: .72rem; color: var(--brand-ink); }
.topbar .spacer { flex: 1; }
.topbar .crumb { font-size: .82rem; color: var(--ink-soft); font-weight: 600; }

/* toolbar buttons */
.toolbar { display: flex; align-items: center; gap: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px; min-height: 38px;
  font: inherit; font-size: .82rem; font-weight: 600; cursor: pointer;
  padding: 8px 13px; border-radius: 10px; border: 1px solid var(--brand);
  background: var(--brand); color: #fff; transition: filter .15s ease, background .15s ease;
}
.btn:hover { filter: brightness(1.05); }
.btn.ghost { background: #fff; color: var(--brand-ink); border-color: var(--line); }
.btn.ghost:hover { border-color: var(--brand); background: #f4f8ff; }
.btn.danger { background: #fff; color: var(--danger); border-color: #f0c2cb; }
.btn.danger:hover { background: #fdf2f4; }
.btn .icon { width: 16px; height: 16px; }
.edit-only { display: none; }
body.editing .edit-only { display: inline-flex; }
body.editing #editToggle { background: #fff; color: var(--brand-ink); border-color: var(--brand); }

.wrap { max-width: 1120px; margin: 0 auto; padding: 30px 18px 80px; }

.editmode-banner {
  display: none; max-width: 1120px; margin: 14px auto -6px; padding: 9px 14px;
  background: #fff7e6; border: 1px solid #ffe2a8; color: #8a6212;
  border-radius: 10px; font-size: .82rem; text-align: center;
}
body.editing .editmode-banner { display: block; }

.hero { text-align: center; margin-bottom: 22px; }
.hero h1 { margin: 0 0 8px; font-weight: 800; letter-spacing: -.5px; text-transform: uppercase; font-size: clamp(1.5rem, 4vw, 2.4rem); color: var(--ink); }
.hero p { margin: 0; color: var(--ink-soft); font-size: .92rem; }

.legend { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin: 20px auto 8px; }
.legend span { display: inline-flex; align-items: center; gap: 7px; font-size: .82rem; color: var(--ink-soft); }
.swatch { width: 13px; height: 13px; border-radius: 4px; display: inline-block; }
.legend .wirekey { width: 18px; height: 0; border-top: 2px dashed var(--wire); }

/* ---------- org canvas with connector layer ---------- */
.org { position: relative; margin-top: 28px; }
.wires { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: visible; }
.org > *:not(.wires) { position: relative; z-index: 1; }

.row-head { display: flex; justify-content: center; }
.row-people { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 64px; align-items: flex-start; }
.section-label { text-align: center; color: var(--ink-soft); font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; margin: 58px 0 18px; }
.row-projects { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 18px; align-items: start; }
@media (max-width: 860px) { .row-projects { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (max-width: 520px) { .row-projects { grid-template-columns: 1fr; } }

/* ---------- cards ---------- */
.card {
  background: var(--card); border: 1px solid var(--line); border-radius: 14px;
  padding: 13px 18px; text-align: center; position: relative;
  box-shadow: 0 6px 18px rgba(31,52,90,.06); transition: transform .18s ease, box-shadow .18s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(31,52,90,.12); }
.card .title { font-weight: 700; font-size: .98rem; }
.card .sub { font-size: .74rem; color: var(--ink-soft); margin-top: 2px; }

.head-node {
  width: 270px; border: 1px solid transparent;
  background: linear-gradient(var(--card), var(--card)) padding-box, linear-gradient(135deg, var(--brand-teal), var(--brand)) border-box;
}
.head-node .title { font-size: 1.1rem; }
.person-node { width: 152px; }
body.editing .person-node { width: 200px; text-align: left; }
body.editing .head-node { width: 300px; text-align: left; }

/* ---------- projects ---------- */
.project { background: var(--card); border: 1px solid var(--line); border-top: 4px solid var(--accent); border-radius: 16px; overflow: hidden; box-shadow: 0 6px 18px rgba(31,52,90,.06); transition: box-shadow .18s ease; }
.project:hover { box-shadow: 0 12px 26px rgba(20,30,50,.14); }
.project-header {
  width: 100%; min-height: 44px; padding: 15px 16px; cursor: pointer; user-select: none; text-align: left;
  background: var(--card); border: none;
  display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: background .18s ease;
}
.project-header:hover { background: rgba(47,127,232,.05); }
.project-header.project-edit { cursor: default; align-items: flex-start; }
.project-header.project-edit:hover { background: var(--card); }
.p-title { font-weight: 800; font-size: 1.18rem; color: var(--accent-ink); }
.owners { font-size: .76rem; color: var(--ink-soft); margin-top: 3px; }
.chevron { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: var(--accent-ink); background: color-mix(in srgb, var(--accent) 14%, white); transition: transform .25s ease; font-size: 14px; }
.project.open .chevron { transform: rotate(90deg); }

.leaves { max-height: 0; overflow: hidden; transition: max-height .25s ease; padding: 0 14px; }
/* when open, allow overflow so items are never clipped / un-clickable */
.project.open .leaves { max-height: 2000px; overflow: visible; padding-bottom: 14px; }
body.editing .leaves { max-height: none; overflow: visible; padding-bottom: 14px; } /* always open while editing */

.leaf {
  position: relative; width: 100%; min-height: 44px; margin-top: 10px; padding: 11px 13px; text-align: left;
  border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 10px; font-size: .9rem; background: #fbfdff;
  display: flex; align-items: center; gap: 10px; color: var(--ink);
  transition: background .18s ease, transform .15s ease, box-shadow .18s ease;
}
.leaf .l-ico { width: 18px; height: 18px; color: var(--accent-ink); }
.leaf .lbl { flex: 1; font-weight: 600; }
.leaf[data-nav]:not([data-nav="none"]) { cursor: pointer; }
/* keep the soft black drop-shadow underneath each toggle on hover */
.leaf:hover { transform: translateY(-1px); box-shadow: 0 7px 16px rgba(20,30,50,.20); }
.leaf[data-nav]:not([data-nav="none"]):hover { background: color-mix(in srgb, var(--accent) 10%, white); }
.leaf .open-ico { width: 15px; height: 15px; color: var(--ink-soft); }

/* ---------- editable fields ---------- */
.edit-field { display: block; margin-top: 8px; }
.edit-field .lab { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); font-weight: 700; }
.edit-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 2px; }
.edit-kicker { font-size: .64rem; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-soft); }
.edit-help { margin: 8px 0 0; font-size: .78rem; color: var(--ink-soft); line-height: 1.45; background: #f4f8ff; border: 1px solid #dce7fb; border-radius: 8px; padding: 9px 11px; }
.leaf-edit { flex-direction: column; align-items: stretch; }
.edit-input, select.edit-input, textarea.edit-input {
  width: 100%; font: inherit; font-size: .85rem; padding: 7px 9px; margin-top: 3px;
  border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
}
textarea.edit-input { resize: vertical; min-height: 46px; line-height: 1.4; }
.del-btn {
  flex: 0 0 auto; width: 26px; height: 26px; border-radius: 7px; cursor: pointer;
  border: 1px solid #f0c2cb; background: #fff; color: var(--danger);
  display: grid; place-items: center; font-size: 16px; line-height: 1;
}
.del-btn:hover { background: #fdf2f4; }
.card .del-btn { position: absolute; top: 8px; right: 8px; }
.add-card, .add-leaf {
  border: 1px dashed #b9c6da; background: #f7faff; color: var(--brand-ink);
  border-radius: 12px; cursor: pointer; font-weight: 700; font-size: .85rem;
  display: grid; place-items: center; min-height: 44px;
}
.add-card { width: 152px; }
.add-leaf { margin-top: 10px; padding: 10px; }
.add-card:hover, .add-leaf:hover { background: #eef4ff; border-color: var(--brand); }
.team-pick { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px 12px; }
.team-pick label { font-size: .78rem; display: inline-flex; align-items: center; gap: 5px; color: var(--ink-soft); }

/* maintenance panel */
.maint {
  max-width: 720px; margin: 40px auto 0; background: #fff; border: 1px solid var(--line);
  border-radius: 16px; padding: 22px 24px; box-shadow: 0 6px 18px rgba(31,52,90,.06);
}
.maint h3 { margin: 0 0 4px; font-size: 1rem; }
.maint p.note { margin: 0 0 16px; font-size: .82rem; color: var(--ink-soft); line-height: 1.5; }
.maint .ctl { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
.switch { display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: .88rem; cursor: pointer; }
.switch input { width: 18px; height: 18px; accent-color: var(--brand); }
.maint select { font: inherit; font-size: .86rem; padding: 8px 10px; border: 1px solid var(--line); border-radius: 9px; background: #fff; color: var(--ink); }
.maint .cleanup-report { margin-top: 14px; font-size: .82rem; color: var(--ink-soft); }

/* ---------- content pages ---------- */
.page-card { background: var(--card); border: 1px solid var(--line); border-top: 5px solid var(--accent); border-radius: 18px; padding: 30px; box-shadow: 0 10px 30px rgba(31,52,90,.08); }
.badge { display: inline-flex; align-items: center; gap: 6px; font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-ink); background: color-mix(in srgb, var(--accent) 12%, white); padding: 6px 11px; border-radius: 999px; margin-bottom: 14px; }
.page-card h2 { margin: 0 0 10px; font-size: clamp(1.4rem, 3vw, 2rem); text-transform: uppercase; letter-spacing: -.5px; }
.page-card p.lead { color: var(--ink-soft); margin: 0; max-width: 60ch; line-height: 1.6; }
.grid-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 16px; margin-top: 24px; }
.tile { background: #fbfdff; border: 1px solid var(--line); border-radius: 14px; padding: 18px; cursor: pointer; text-decoration: none; color: inherit; min-height: 44px; display: flex; flex-direction: column; gap: 8px; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; position: relative; }
.tile:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(31,52,90,.12); border-color: var(--brand); }
.t-icon { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; color: #fff; }
.t-icon .icon { width: 22px; height: 22px; }
.t-title { font-weight: 700; display: flex; align-items: center; gap: 7px; }
.t-title .open-ico { width: 14px; height: 14px; color: var(--ink-soft); }
.t-sub { font-size: .8rem; color: var(--ink-soft); }
.back { display: inline-flex; align-items: center; gap: 7px; min-height: 44px; margin-bottom: 18px; cursor: pointer; padding: 8px 14px 8px 10px; font-size: .85rem; font-weight: 600; color: var(--brand-ink); background: #fff; border: 1px solid var(--line); border-radius: 10px; transition: background .18s ease, border-color .18s ease; }
.back:hover { background: #f4f8ff; border-color: var(--brand); }
.back .icon { width: 16px; height: 16px; }
.soon { margin-top: 22px; padding: 16px 18px; border-radius: 12px; background: #fbfdff; border: 1px dashed var(--line); color: var(--ink-soft); font-size: .9rem; line-height: 1.55; }

/* ---------- course: meta chips + curriculum roadmap ---------- */
.c-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.c-chip { display: inline-flex; align-items: center; gap: 6px; font-size: .78rem; font-weight: 600; color: var(--accent-ink); background: color-mix(in srgb, var(--accent) 12%, white); border: 1px solid color-mix(in srgb, var(--accent) 26%, white); padding: 6px 11px; border-radius: 999px; }
.c-chip .icon { width: 14px; height: 14px; }
.c-rm-title { display: flex; align-items: center; gap: 8px; margin: 28px 0 4px; font-size: 1.05rem; font-weight: 800; color: var(--ink); }
.c-rm-title .icon { width: 18px; height: 18px; color: var(--accent-ink); }

.roadmap { margin-top: 14px; }
.rm-item { display: grid; grid-template-columns: 40px 1fr; gap: 16px; padding-bottom: 20px; }
.rm-item:last-child { padding-bottom: 0; }
.rm-rail { position: relative; display: flex; justify-content: center; }
.rm-num { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: .86rem; color: #fff; background: var(--accent); box-shadow: 0 4px 10px color-mix(in srgb, var(--accent) 40%, transparent); z-index: 1; }
.rm-line { position: absolute; top: 34px; bottom: -20px; left: 50%; width: 2px; transform: translateX(-50%); background: var(--line); }
.rm-item:last-child .rm-line { display: none; }
.rm-body { padding-top: 3px; }
.rm-phase { font-size: .66rem; font-weight: 800; letter-spacing: .09em; text-transform: uppercase; color: var(--accent-ink); }
.rm-title { font-weight: 700; font-size: 1rem; margin-top: 2px; }
.rm-detail { font-size: .88rem; color: var(--ink-soft); margin-top: 5px; line-height: 1.55; white-space: pre-wrap; }
.rm-detail.empty { font-style: italic; opacity: .7; }

/* course editor */
.c-meta-edit { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
@media (max-width: 560px) { .c-meta-edit { grid-template-columns: 1fr; } }
.rm-edit { border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 12px; padding: 12px 14px; margin-top: 12px; background: #fbfdff; }
.rm-edit-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.rm-moves { display: inline-flex; align-items: center; gap: 6px; }

/* reorder arrows (courses + roadmap modules) */
.move-btn { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 7px; cursor: pointer; border: 1px solid var(--line); background: #fff; color: var(--brand-ink); display: grid; place-items: center; }
.move-btn .icon { width: 15px; height: 15px; }
.move-btn:hover:not([disabled]) { background: #f4f8ff; border-color: var(--brand); }
.move-btn[disabled] { opacity: .35; cursor: not-allowed; }
.tile-moves { display: flex; align-items: center; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); }
.tile-moves-lbl { font-size: .72rem; color: var(--ink-soft); font-weight: 600; }

/* stats row */
.c-stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 18px; }
@media (max-width: 560px) { .c-stats { grid-template-columns: 1fr; } }
.c-stat { background: #fbfdff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; display: flex; flex-direction: column; gap: 4px; }
.c-stat-ico { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; color: #fff; background: var(--accent); margin-bottom: 4px; }
.c-stat-ico .icon { width: 17px; height: 17px; }
.c-stat-num { font-size: 1.7rem; font-weight: 800; line-height: 1.05; color: var(--ink); }
.c-stat-lab { font-size: .74rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-soft); }

/* dashboard sections */
.c-section { margin-top: 30px; }
.c-sec-title { display: flex; align-items: center; gap: 8px; margin: 0 0 12px; font-size: 1.05rem; font-weight: 800; color: var(--ink); }
.c-sec-title .icon { width: 18px; height: 18px; color: var(--accent-ink); }
.c-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.c-li { border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 10px; padding: 12px 14px; background: #fbfdff; font-size: .9rem; line-height: 1.5; color: var(--ink); }
.c-li-ai { border-left-color: var(--marketplace); background: color-mix(in srgb, var(--marketplace) 6%, #fbfdff); }
.c-li-link { display: inline-flex; align-items: center; gap: 7px; color: var(--brand-ink); text-decoration: none; font-weight: 600; }
.c-li-link:hover { text-decoration: underline; }
.c-li-link .icon { width: 13px; height: 13px; }
.c-empty { margin: 0; padding: 14px 16px; border-radius: 10px; background: #fbfdff; border: 1px dashed var(--line); color: var(--ink-soft); font-size: .86rem; font-style: italic; }
.cl-edit { border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 12px; padding: 12px 14px; margin-top: 12px; background: #fbfdff; }
.editing .c-section { margin-top: 26px; }

.hint { text-align: center; color: var(--ink-soft); font-size: .78rem; margin-top: 36px; }
.footnote { text-align: center; color: var(--ink-soft); font-size: .72rem; margin-top: 18px; opacity: .8; }

/* Hover tooltips removed - the soft drop shadow on hover (above) is the only hover cue. */

/* toast */
.toast {
  position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 12px 18px; border-radius: 12px;
  font-size: .85rem; max-width: 90vw; box-shadow: 0 12px 30px rgba(0,0,0,.3); z-index: 100;
  opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .topbar { padding: 10px 14px; flex-wrap: wrap; }
  .topbar .crumb { display: none; }
  .wrap { padding: 22px 14px 60px; }
  .page-card { padding: 22px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: .001ms !important; animation-duration: .001ms !important; }
  .card:hover, .tile:hover, .leaf:hover { transform: none; }
}
</style>
</head>
<body>
  <div class="topbar">
    <button class="logo" id="homeLogo" title="Back to team map" aria-label="Edge Academy &mdash; back to team map">
      <svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#16b8c4"/><stop offset="1" stop-color="#2f7fe8"/></linearGradient></defs>
        <path d="M24 3 L45 45 L31 45 L24 30 L17 45 L3 45 Z" fill="url(#lg)"/>
        <path d="M24 16 L33 34 L24 34 Z" fill="#ffffff" opacity=".55"/>
      </svg>
      <span class="word"><b>EDGE</b><span>ACADEMY</span></span>
    </button>
    <div class="spacer"></div>
    <div class="crumb" id="crumb">AI Team Map</div>
    <div class="toolbar">
      <button class="btn" id="editToggle" type="button">Edit</button>
      <button class="btn ghost edit-only" id="exportBtn" type="button" title="Download your edits as JSON to share">Export</button>
      <label class="btn ghost edit-only" title="Load a shared JSON file">Import
        <input type="file" id="importInput" accept="application/json,.json" hidden />
      </label>
      <button class="btn danger edit-only" id="resetBtn" type="button" title="Restore original content">Reset</button>
    </div>
  </div>

  <div class="editmode-banner">You're editing. Click any box to change its text. Use <strong>+ Add</strong> / <strong>&times;</strong> to add or remove. Changes save automatically in this browser &mdash; press <strong>Export</strong> to send them to someone else, then <strong>Done</strong> when finished.</div>

  <div class="wrap" id="app"><!-- rendered by the script below --></div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* =========================================================================
   MyRepublic AI Team - connected flowchart (self-contained single file)
   Single source of editable content lives in DEFAULT_DATA below.
   Anyone with the file can edit content in the browser (Edit button),
   which autosaves to this browser, and can Export/Import a JSON to share.
   ========================================================================= */

const STORAGE_KEY = "mr-ai-flowchart-v1";

/* ---- default content (used on first load / Reset) ---- */

function touch(rec) { if (rec) rec.lastEdited = now(); }

/* stamp lastEdited on every editable record that lacks one */
function seedTimestamps(d, ts) {
  ts = ts || now();
  const stamp = (r) => { if (r && r.lastEdited == null) r.lastEdited = ts; };
  stamp(d.head);
  (d.people || []).forEach(stamp);
  (d.projects || []).forEach(p => { stamp(p); (p.leaves || []).forEach(stamp); });
  Object.values(d.pages || {}).forEach(stamp);
  (d.courses || []).forEach(stamp);
}

function load() {
  let raw = null;
  try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { /* storage blocked */ }
  if (raw) {
    try { DATA = JSON.parse(raw); } catch (e) { DATA = clone(DEFAULT_DATA); }
  } else {
    DATA = clone(DEFAULT_DATA);
  }
  if (!DATA.settings) DATA.settings = clone(DEFAULT_DATA.settings);
  // fill in any missing link keys (e.g. new skool / edgeAcademy) without losing saved edits
  DATA.links = Object.assign({}, clone(DEFAULT_DATA.links), DATA.links || {});
  if (!DATA.pages) DATA.pages = {};
  migrateCourses(DATA);
  seedTimestamps(DATA);
  // run auto-cleanup on load if enabled
  runCleanup(false);
}

/* Ensure every course carries the shared roadmap layout + meta fields, so
   courses saved before this feature existed still show the fill-in-the-blanks
   curriculum roadmap. */
function migrateCourses(d) {
  (d.courses || []).forEach(c => {
    if (typeof c.level            !== "string") c.level = "";
    if (typeof c.duration         !== "string") c.duration = "";
    if (typeof c.intro            !== "string") c.intro = "";
    if (typeof c.studentsEnrolled !== "string") c.studentsEnrolled = "";
    if (typeof c.completionRate   !== "string") c.completionRate = "";
    if (!Array.isArray(c.roadmap)) c.roadmap = newRoadmap();
    c.roadmap.forEach(m => { if (!m.id) m.id = genId("mod"); });
    // the four secondary dashboard sections start blank on every course
    ["activity", "resources", "adjustments", "comingSoon"].forEach(k => {
      if (!Array.isArray(c[k])) c[k] = [];
      c[k].forEach(it => { if (!it.id) it.id = genId("it"); });
    });
  });
}

/* A fresh, fully-blank course carrying the shared dashboard layout. */
function blankCourse() {
  return { slug: genId("course"), title: "New course", sub: "", level: "", duration: "",
           intro: "", studentsEnrolled: "", completionRate: "", roadmap: newRoadmap(),
           activity: [], resources: [], adjustments: [], comingSoon: [], lastEdited: now() };
}

function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
    catch (e) { toast("Could not save to this browser (storage blocked). Use Export instead."); }
  }, 200);
}

function toast(msg, ms) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove("show"), ms || 3200);
}

/* =========================================================================
   AUTO-CLEANUP - delete items not edited within the retention window
   ========================================================================= */
function cutoffTime(months) {
  const d = new Date();
  d.setMonth(d.getMonth() - months);
  return d.getTime();
}

function runCleanup(manual) {
  const s = DATA.settings;
  if (!s.autoCleanup) {
    if (manual) toast("Auto-cleanup is disabled - enable it first.");
    return;
  }
  const cutoff = cutoffTime(s.retentionMonths);
  const stale = (r) => r && r.lastEdited != null && r.lastEdited < cutoff;
  const removed = [];

  // people
  const keptPeople = [];
  (DATA.people || []).forEach(p => { if (stale(p)) removed.push("Person: " + p.name); else keptPeople.push(p); });
  DATA.people = keptPeople;
  const peopleIds = new Set(DATA.people.map(p => p.id));

  // projects (and their leaves); drop dangling owner refs
  const keptProjects = [];
  (DATA.projects || []).forEach(pr => {
    if (stale(pr)) { removed.push("Project: " + pr.name); return; }
    pr.team = (pr.team || []).filter(id => peopleIds.has(id));
    const keptLeaves = [];
    (pr.leaves || []).forEach(lf => { if (stale(lf)) removed.push("Item: " + pr.name + " > " + lf.lbl); else keptLeaves.push(lf); });
    pr.leaves = keptLeaves;
    keptProjects.push(pr);
  });
  DATA.projects = keptProjects;

  // courses
  const keptCourses = [];
  (DATA.courses || []).forEach(c => { if (stale(c)) removed.push("Course: " + c.title); else keptCourses.push(c); });
  DATA.courses = keptCourses;

  // detail pages
  Object.keys(DATA.pages || {}).forEach(k => { if (stale(DATA.pages[k])) { removed.push("Page: " + DATA.pages[k].title); delete DATA.pages[k]; } });

  if (removed.length) {
    save();
    const summary = removed.length + " item(s) removed (not edited in " + s.retentionMonths + " month" + (s.retentionMonths > 1 ? "s" : "") + ")";
    DATA._lastCleanup = { when: now(), summary, removed };
    if (manual) toast(summary);
  } else if (manual) {
    DATA._lastCleanup = { when: now(), summary: "Nothing to remove - all items edited within the window.", removed: [] };
    toast("Nothing to remove - everything is within the window.");
  }
}

/* =========================================================================
   CONNECTOR DRAWING
   ========================================================================= */
function drawWires() {
  const org = document.getElementById("org");
  const svg = document.getElementById("wires");
  if (!org || !svg || editing) return;
  const o = org.getBoundingClientRect();
  svg.setAttribute("width", Math.round(o.width));
  svg.setAttribute("height", Math.round(org.scrollHeight));

  const box = (id) => {
    const el = document.getElementById(id);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return { cx: r.left - o.left + r.width / 2, top: r.top - o.top, bottom: r.bottom - o.top };
  };
  const curve = (a, b, color, w, op) => {
    if (!a || !b) return "";
    const sx = a.cx, sy = a.bottom, tx = b.cx, ty = b.top;
    const dy = Math.max(28, (ty - sy) * 0.5);
    return `<path d="M ${sx} ${sy} C ${sx} ${sy + dy} ${tx} ${ty - dy} ${tx} ${ty}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linecap="round" opacity="${op}"/>`
         + `<circle cx="${sx}" cy="${sy}" r="3" fill="${color}"/><circle cx="${tx}" cy="${ty}" r="3" fill="${color}"/>`;
  };

  let paths = "";
  const head = box("n-head");
  DATA.people.forEach(p => { paths += curve(head, box("n-" + p.id), cssVar("--wire"), 2, 0.75); });
  DATA.projects.forEach(pr => {
    const color = cssVar("--" + pr.accent) || cssVar("--edge");
    (pr.team || []).forEach(pid => { paths += curve(box("n-" + pid), box("h-" + pr.id), color, 2.5, 0.85); });
  });
  svg.innerHTML = paths;
}

/* =========================================================================
   ROUTER  (internal routes stay in THIS tab - no localhost re-fetch)
   ========================================================================= */
function route() {
  if (orgObserver) { orgObserver.disconnect(); orgObserver = null; }
  const h = location.hash.replace(/^#\/?/, "");
  if (!h)                           renderHome();
  else if (h === "courses")         renderCourses();
  else if (h === "community")       renderCommunity();
  else if (h === "social")          renderSocial();
  else if (h.startsWith("page/"))   renderDetail(h.slice(5));
  else if (h.startsWith("course/")) renderCourse(h.slice(7));
  else                              renderHome();
  window.scrollTo(0, 0);
}
const reRender = () => route();

/* =========================================================================
   NAVIGATION (view mode)
   ========================================================================= */
function navigate(leaf) {
  switch (leaf.nav) {
    case "view": location.hash = "#/" + (leaf.target || "");           break; // same tab
    case "page": location.hash = "#/page/" + (leaf.target || "");      break; // same tab
    case "ext":
      if (leaf.target && leaf.target !== "#") window.open(leaf.target, "_blank", "noopener");
      else toast("No URL set for this link yet.");
      break;
    default: /* none */ break;
  }
}

/* =========================================================================
   EDIT-MODE WIRING
   ========================================================================= */
function setField(path, value) {
  const p = path.split(".");
  switch (p[0]) {
    case "head":    DATA.head[p[1]] = value; touch(DATA.head); break;
    case "person":  { const r = findPerson(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "project": { const r = findProject(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "leaf":    { const r = findLeaf(p[1], p[2]); if (r) { r[p[3]] = value; touch(r); } break; }
    case "course":  { const r = findCourse(p[1]); if (r) { r[p[2]] = value; touch(r); } break; }
    case "module":  { const c = findCourse(p[1]); if (c) { const m = (c.roadmap || []).find(x => x.id === p[2]); if (m) { m[p[3]] = value; touch(c); } } break; }
    case "clist":   { const c = findCourse(p[1]); if (c && Array.isArray(c[p[2]])) { const it = c[p[2]].find(x => x.id === p[3]); if (it) { it[p[4]] = value; touch(c); } } break; }
    case "page":    { const r = DATA.pages[p[1]]; if (r) { r[p[2]] = value; touch(r); } break; }
    case "link":    DATA.links[p[1]] = value; break;
  }
  save();
}

function addRecord(spec) {
  const p = spec.split(".");
  if (p[0] === "person") {
    DATA.people.push({ id: genId("p"), name: "New person", tip: "", lastEdited: now() });
  } else if (p[0] === "project") {
    DATA.projects.push({ id: genId("proj"), name: "New project", accent: ACCENTS[DATA.projects.length % ACCENTS.length], team: [], tip: "", leaves: [], lastEdited: now() });
  } else if (p[0] === "leaf") {
    const pr = findProject(p[1]);
    if (pr) pr.leaves.push({ id: genId("l"), lbl: "New item", nav: "none", target: "", tip: "", lastEdited: now() });
  } else if (p[0] === "course") {
    // New courses inherit the shared dashboard layout, then open straight into
    // their edit page so you can fill in the blanks.
    const c = blankCourse();
    DATA.courses.push(c);
    save();
    location.hash = "#/course/" + c.slug; // hashchange re-renders in edit mode
    return;
  } else if (p[0] === "module") {
    const c = findCourse(p[1]);
    if (c) { if (!Array.isArray(c.roadmap)) c.roadmap = []; c.roadmap.push({ id: genId("mod"), phase: "New module", title: "", detail: "" }); touch(c); }
  } else if (p[0] === "clist") {
    // p = ["clist", slug, sectionKey]
    const c = findCourse(p[1]);
    if (c) { if (!Array.isArray(c[p[2]])) c[p[2]] = []; c[p[2]].push({ id: genId("it"), text: "", name: "", url: "" }); touch(c); }
  }
  save(); reRender();
}

function delRecord(spec) {
  const p = spec.split(".");
  if (p[0] === "person")  DATA.people = DATA.people.filter(x => x.id !== p[1]);
  else if (p[0] === "project") DATA.projects = DATA.projects.filter(x => x.id !== p[1]);
  else if (p[0] === "leaf") { const pr = findProject(p[1]); if (pr) pr.leaves = pr.leaves.filter(x => x.id !== p[2]); }
  else if (p[0] === "course") DATA.courses = DATA.courses.filter(x => x.slug !== p[1]);
  else if (p[0] === "module") { const c = findCourse(p[1]); if (c) { c.roadmap = (c.roadmap || []).filter(m => m.id !== p[2]); touch(c); } }
  else if (p[0] === "clist")  { const c = findCourse(p[1]); if (c && Array.isArray(c[p[2]])) { c[p[2]] = c[p[2]].filter(it => it.id !== p[3]); touch(c); } }
  save(); reRender();
}

/* Reorder a course in the catalogue, or a module within a course's roadmap. */
function moveInArray(arr, i, dir) {
  if (i < 0) return;
  const j = dir === "up" ? i - 1 : i + 1;
  if (j < 0 || j >= arr.length) return;
  const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
}

function moveRecord(spec) {
  const p = spec.split(".");
  if (p[0] === "course") {
    moveInArray(DATA.courses, DATA.courses.findIndex(c => c.slug === p[1]), p[2]);
  } else if (p[0] === "module") {
    const c = findCourse(p[1]);
    if (c && Array.isArray(c.roadmap)) { moveInArray(c.roadmap, c.roadmap.findIndex(m => m.id === p[2]), p[3]); touch(c); }
  }
  save(); reRender();
}

function onChangeSelectOrCheck(el) {
  // accent / nav selects
  const ch = el.getAttribute("data-change");
  if (ch) {
    const p = ch.split(".");
    if (p[0] === "project") { const r = findProject(p[1]); if (r) { r[p[2]] = el.value; touch(r); } }
    else if (p[0] === "leaf") {
      const r = findLeaf(p[1], p[2]);
      if (r) {
        r[p[3]] = el.value; touch(r);
        if (p[3] === "nav") {
          // when the action changes, give the target a sensible default for that action
          if (r.nav === "view" && !["courses", "community", "social"].includes(r.target)) r.target = "courses";
          else if (r.nav === "ext" && !/^https?:/i.test(r.target || "")) r.target = "";
          else if (r.nav === "none") r.target = "";
          else if (r.nav === "page") { if (!r.target || ["courses","community","social"].includes(r.target)) r.target = slugify(r.lbl); }
        }
        // ensure an info page exists to back a "page" item
        if (r.nav === "page" && r.target && !DATA.pages[r.target]) {
          DATA.pages[r.target] = { title: r.lbl, project: "", accent: "edge", desc: "", lastEdited: now() };
        }
      }
    }
    save(); reRender(); return;
  }
  // owner checkboxes
  const team = el.getAttribute("data-team");
  if (team) {
    const pr = findProject(team);
    if (pr) {
      const id = el.value;
      if (el.checked) { if (!pr.team.includes(id)) pr.team.push(id); }
      else pr.team = pr.team.filter(x => x !== id);
      touch(pr); save(); reRender();
    }
  }
}

/* ---- editor toolbar actions ---- */
function setEditing(on) {
  editing = on;
  document.body.classList.toggle("editing", on);
  document.getElementById("editToggle").innerHTML = on ? "Done" : (I.pencil + "Edit");
  reRender();
}

function exportJSON() {
  const out = clone(DATA); delete out._lastCleanup;
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "flowchart-data.json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("Exported flowchart-data.json - share this file to share your edits.");
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed.people || !parsed.projects) throw new Error("Not a flowchart data file");
      DATA = parsed;
      if (!DATA.settings) DATA.settings = clone(DEFAULT_DATA.settings);
      DATA.links = Object.assign({}, clone(DEFAULT_DATA.links), DATA.links || {});
      if (!DATA.pages) DATA.pages = {};
      migrateCourses(DATA);
      seedTimestamps(DATA);
      save(); location.hash = ""; reRender();
      toast("Imported successfully.");
    } catch (e) { toast("Import failed: " + e.message); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirm("Reset all content back to the original defaults? Your edits in this browser will be lost.")) return;
  DATA = clone(DEFAULT_DATA); seedTimestamps(DATA); save(); location.hash = ""; reRender();
  toast("Reset to defaults.");
}

/* =========================================================================
   GLOBAL EVENT WIRING
   ========================================================================= */
document.getElementById("editToggle").addEventListener("click", () => setEditing(!editing));
document.getElementById("exportBtn").addEventListener("click", exportJSON);
document.getElementById("resetBtn").addEventListener("click", resetAll);
document.getElementById("importInput").addEventListener("change", (e) => { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });
document.getElementById("homeLogo").addEventListener("click", () => { location.hash = ""; });

/* text inputs / textareas - update model only (no re-render -> keeps focus) */
app.addEventListener("input", (e) => {
  const bind = e.target.getAttribute && e.target.getAttribute("data-bind");
  if (bind) setField(bind, e.target.value);
});

/* selects + checkboxes */
app.addEventListener("change", (e) => {
  if (e.target.matches("[data-change], [data-team]")) onChangeSelectOrCheck(e.target);
  if (e.target.id === "cleanupToggle") {
    if (e.target.checked && !confirm("Enable auto-cleanup? Items not edited within the selected window will be permanently deleted (on load and when you run it). Export a backup first.")) {
      e.target.checked = false; return;
    }
    DATA.settings.autoCleanup = e.target.checked; save();
    if (e.target.checked) runCleanup(true);
    reRender();
  }
  if (e.target.id === "retentionSelect") { DATA.settings.retentionMonths = parseInt(e.target.value, 10); save(); }
});

/* clicks: navigation, expand, add/delete, back, cleanup-now */
app.addEventListener("click", (e) => {
  const t = e.target;
  if (t.closest("[data-back]")) { location.hash = ""; return; }
  if (t.id === "cleanupNow") { runCleanup(true); reRender(); return; }

  const del = t.closest("[data-del]"); if (del) { delRecord(del.getAttribute("data-del")); return; }
  const add = t.closest("[data-add]"); if (add) { addRecord(add.getAttribute("data-add")); return; }
  const mv  = t.closest("[data-move]"); if (mv) { if (!mv.hasAttribute("disabled")) moveRecord(mv.getAttribute("data-move")); return; }

  if (editing) return; // no navigation while editing

  const course = t.closest("[data-course]");
  if (course) { location.hash = "#/course/" + course.getAttribute("data-course"); return; }

  const leafEl = t.closest(".leaf[data-leaf]");
  if (leafEl && leafEl.getAttribute("data-nav") !== "none") {
    const parts = leafEl.getAttribute("data-leaf").split(".");
    const lf = findLeaf(parts[0], parts[1]); if (lf) navigate(lf);
    return;
  }
  const header = t.closest(".project-header");
  if (header) {
    const open = header.closest(".project").classList.toggle("open");
    header.setAttribute("aria-expanded", open ? "true" : "false");
    drawWires(); setTimeout(drawWires, 320);
  }
});

/* keyboard activation for nodes (a11y) */
app.addEventListener("keydown", (e) => {
  if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
  if (editing) return;
  const el = e.target;
  if (el.matches(".leaf[data-leaf], .project-header, [data-course]")) {
    e.preventDefault(); el.click();
  }
});

let resizeT = null;
window.addEventListener("resize", () => { clearTimeout(resizeT); resizeT = setTimeout(drawWires, 80); });
window.addEventListener("hashchange", route);

/* ---- boot ---- */
load();
document.getElementById("editToggle").innerHTML = I.pencil + "Edit";
route();
</script>
</body>
</html>
